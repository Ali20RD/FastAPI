

services:
  db:
    image: postgres:18-alpine3.23 
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: book_user
      POSTGRES_PASSWORD: book_password
      POSTGRES_DB: store_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/store_data

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: